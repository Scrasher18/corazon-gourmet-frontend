<div class="min-h-screen flex selection:bg-[#D96C6B] selection:text-white bg-[#F9F6F0]">
  
  <div class="hidden lg:flex lg:w-1/2 relative">
    <img src="/assets/images/imagen_login.jpg" alt="Personal cocinando en Corazón Gourmet" class="absolute inset-0 w-full h-full object-cover">
    
    <div class="absolute inset-0 bg-[#3D2616]/85 mix-blend-multiply"></div>
    
    <div class="absolute inset-0 flex flex-col justify-center items-center text-center p-16 space-y-8 animate-fadeIn">
      <img src="/assets/images/logo.png" alt="Corazón Gourmet Logo" class="h-44 w-44 rounded-full border-4 border-[#F9F6F0]/90 shadow-2xl">
      <h1 class="text-white text-5xl font-extrabold tracking-tighter drop-shadow-2xl">Corazón Gourmet</h1>
      <p class="text-[#F9F6F0] text-xl font-medium max-w-md drop-shadow-md">Sistema de Gestión e Inclusión para la Gastronomía Peruana.</p>
    </div>
  </div>
  
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 animate-fadeInSlow">
    
    <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-3xl shadow-[0_20px_50px_rgba(74,53,37,0.15)] border border-[#E3D5CA] relative overflow-hidden">
      
      <div class="absolute top-0 left-0 right-0 h-2 bg-[#D96C6B]"></div>

      <div class="text-center flex flex-col items-center mb-10">
        <img src="/assets/images/logo.png" alt="Corazón Gourmet Logo" class="h-24 w-24 rounded-full border-2 border-[#E3D5CA] shadow-md mb-5">
        
        <h2 class="text-3xl font-black text-[#4A3525] tracking-tight">Acceso al Sistema</h2>
        <p class="text-sm font-bold text-[#D96C6B] mt-1">Gestión e Inclusión Gastronómica</p>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-6">
        
        <div class="space-y-2">
          <label class="text-xs font-black text-[#6B5140] uppercase tracking-wider ml-1">Documento de Identidad (DNI)</label>
          <div class="relative group">
            
            <img src="/assets/icons/dni.png" alt="Usuario" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60 group-focus-within:opacity-100 transition-opacity">
            
            <input 
              type="text" 
              name="dni" 
              [(ngModel)]="dni" 
              maxLength="8" 
              placeholder="Ingresa tu DNI de 8 dígitos" 
              class="w-full pl-12 pr-4 py-4 bg-[#FDFBF9] border-2 border-[#E3D5CA] rounded-xl text-base font-black text-[#3D2616] focus:outline-none focus:ring-0 focus:border-[#D96C6B] transition-all placeholder:text-[#A39183]"
              [class.!border-rose-500]="showError"
              [class.bg-rose-50]="showError"
            >
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-black text-[#6B5140] uppercase tracking-wider ml-1">Contraseña</label>
          <div class="relative group">
            
            <img src="/assets/icons/editar.png" alt="Clave" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60 group-focus-within:opacity-100 transition-opacity">
            
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              name="password" 
              [(ngModel)]="password" 
              placeholder="••••••••" 
              class="w-full pl-12 pr-12 py-4 bg-[#FDFBF9] border-2 border-[#E3D5CA] rounded-xl text-base font-black text-[#3D2616] focus:outline-none focus:ring-0 focus:border-[#D96C6B] transition-all placeholder:text-[#A39183]"
              [class.!border-rose-500]="showError"
              [class.bg-rose-50]="showError"
            >

            <button 
              type="button" 
              (click)="togglePasswordVisibility()" 
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[#A39183] hover:text-[#D96C6B] transition-colors focus:outline-none"
            >
              <lucide-icon [img]="showPassword ? EyeOffIcon : EyeIcon" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="flex justify-end -mt-4 mb-6">
          <a routerLink="/cambiar-password" class="text-[11px] font-black text-[#D96C6B] hover:text-[#C25857] hover:underline transition-all cursor-pointer">
            ¿Olvidaste o quieres cambiar tu contraseña?
          </a>
        </div>

        <div class="pt-4">
          <button 
            type="submit" 
            [disabled]="isLoading" 
            class="w-full flex items-center justify-center gap-3 py-4 bg-[#D96C6B] hover:bg-[#C25857] disabled:bg-[#D4C5B9] text-white text-base font-black rounded-2xl shadow-[0_8px_20px_rgba(217,108,107,0.35)] hover:shadow-[0_8px_20px_rgba(217,108,107,0.5)] transition-all active:scale-95 disabled:scale-100 disabled:shadow-none"
            [class.animate-pulse]="isLoading"
          >
            @if (isLoading) {
              <div class="spinner border-t-white"></div>
              <span>Validando acceso...</span>
            } @else {
              <img src="/assets/icons/seleccionado.png" alt="Ingresar" class="w-5 h-5 invert">
              <span>Ingresar al Sistema</span>
            }
          </button>
        </div>

      </form>

      <div class="mt-10 border-t-2 border-[#E3D5CA] pt-8 text-center space-y-4">
        <p class="text-[11px] font-black text-[#8C7667] uppercase tracking-widest">Perfiles de acceso del personal:</p>
        
        <div class="flex items-center justify-center gap-2.5 flex-wrap">
          <span class="px-5 py-2 border-2 border-[#A3B196] bg-[#F2F5EF] text-[#4D633C] text-[11px] font-black rounded-full shadow-sm">Admin</span>
          <span class="px-5 py-2 border-2 border-[#A3B196] bg-[#F2F5EF] text-[#4D633C] text-[11px] font-black rounded-full shadow-sm">Mesero</span>
          <span class="px-5 py-2 border-2 border-[#A3B196] bg-[#F2F5EF] text-[#4D633C] text-[11px] font-black rounded-full shadow-sm">Caja</span>
        </div>
      </div>

    </div>
  </div>
</div>
