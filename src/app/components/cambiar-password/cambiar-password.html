<div class="min-h-screen flex selection:bg-[#D96C6B] selection:text-white bg-[#F9F6F0]">
  
  <div class="hidden lg:flex lg:w-1/2 relative">
    <img src="/assets/images/imagen_recuperarpassword.jpg" alt="Seguridad en Corazón Gourmet" class="absolute inset-0 w-full h-full object-cover">
    
    <div class="absolute inset-0 bg-[#3D2616]/85 mix-blend-multiply"></div>
    
    <div class="absolute inset-0 flex flex-col justify-center items-center text-center p-16 space-y-8 animate-fadeIn">
      <img src="/assets/images/logo.png" alt="Corazón Gourmet Logo" class="h-44 w-44 rounded-full border-4 border-[#F9F6F0]/90 shadow-2xl">
      <h1 class="text-white text-5xl font-extrabold tracking-tighter drop-shadow-2xl">Seguridad</h1>
      <p class="text-[#F9F6F0] text-xl font-medium max-w-md drop-shadow-md">Actualiza tus credenciales para mantener tu cuenta protegida en el sistema.</p>
    </div>
  </div>
  
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 animate-fadeInSlow">
    
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-[0_20px_50px_rgba(74,53,37,0.1)] border border-[#E3D5CA] relative overflow-hidden">
      
      <div class="absolute top-0 left-0 right-0 h-2 bg-[#D96C6B]"></div>

      <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-[#4A3525] tracking-tight">Cambiar Contraseña</h2>
        <p class="text-sm font-bold text-[#D96C6B] mt-1">Gestión segura de credenciales</p>
      </div>

      <form (ngSubmit)="actualizar()" class="space-y-6">
        
        <div class="space-y-1">
          <label class="text-[10px] font-black text-[#6B5140] uppercase ml-1 tracking-widest">Documento (DNI)</label>
          <div class="relative mt-1 group">
            <lucide-icon [img]="UserIcon" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#A39183] group-focus-within:text-[#D96C6B] transition-colors"></lucide-icon>
            <input type="text" [(ngModel)]="dto.dni" name="dni" required maxlength="8" placeholder="8 dígitos" class="w-full pl-14 p-4 bg-[#FDFBF9] border-2 border-[#E3D5CA] rounded-2xl font-black text-[#3D2616] focus:border-[#D96C6B] outline-none transition-all">
          </div>
        </div>
        
        <div class="space-y-1">
          <label class="text-[10px] font-black text-[#6B5140] uppercase ml-1 tracking-widest">Contraseña Actual</label>
          <div class="relative mt-1 group">
            <lucide-icon [img]="KeyIcon" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#A39183] group-focus-within:text-[#D96C6B] transition-colors"></lucide-icon>
            <input [type]="showPassActual ? 'text' : 'password'" [(ngModel)]="dto.passwordActual" name="actual" required placeholder="••••••••" class="w-full pl-14 pr-12 p-4 bg-[#FDFBF9] border-2 border-[#E3D5CA] rounded-2xl font-black text-[#3D2616] focus:border-[#D96C6B] outline-none transition-all">
            <button type="button" (click)="showPassActual = !showPassActual" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#A39183] hover:text-[#4A3525]">
              <lucide-icon [img]="showPassActual ? EyeOffIcon : EyeIcon" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
        </div>
        
        <div class="space-y-1">
          <label class="text-[10px] font-black text-[#6B5140] uppercase ml-1 tracking-widest">Nueva Contraseña</label>
          <div class="relative mt-1 group">
            <lucide-icon [img]="KeyIcon" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#A39183] group-focus-within:text-[#D96C6B] transition-colors"></lucide-icon>
            <input [type]="showPassNueva ? 'text' : 'password'" [(ngModel)]="dto.nuevaPassword" name="nueva" required placeholder="••••••••" class="w-full pl-14 pr-12 p-4 bg-[#FDFBF9] border-2 border-[#E3D5CA] rounded-2xl font-black text-[#3D2616] focus:border-[#D96C6B] outline-none transition-all">
            <button type="button" (click)="showPassNueva = !showPassNueva" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#A39183] hover:text-[#4A3525]">
              <lucide-icon [img]="showPassNueva ? EyeOffIcon : EyeIcon" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full py-4 mt-4 bg-[#D96C6B] text-white font-black rounded-2xl hover:bg-[#C25857] shadow-[0_10px_20px_rgba(217,108,107,0.3)] transition-all active:scale-[0.98]">
          Guardar Cambios
        </button>
        
        <a routerLink="/login" class="block text-center mt-6 text-xs font-bold text-[#8C7667] hover:text-[#4A3525] underline decoration-2 underline-offset-4 transition-all">
          Volver al Login
        </a>
      </form>
    </div>
  </div>
</div>
